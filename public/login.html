<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Login – MMG Renewal Generator</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>.card{max-width:520px;width:92vw}</style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">
  <div class="card shadow-sm">
    <div class="card-body p-4 text-center">
      <h3 class="mb-2">MMG Renewal Generator</h3>
      <p class="text-muted mb-4">Sign in with your MMG Google account.</p>
      <div id="msg" class="alert d-none" role="alert"></div>
      <div class="d-flex justify-content-center mb-3"><div id="googleSignInButton"></div></div>
      <div id="busy" class="d-none">
        <div class="d-flex align-items-center justify-content-center gap-2 text-muted">
          <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
          <div>Signing you in…</div>
        </div>
      </div>
      <div class="small text-muted mt-3">If you see “Not authorised”, your email probably isn’t on the allow-list.</div>
    </div>
  </div>
<script>
const msg=document.getElementById("msg");const busy=document.getElementById("busy");
function showMsg(type,text){msg.className=`alert alert-${type}`;msg.textContent=text;msg.classList.remove("d-none")}
function setBusy(v){busy.classList.toggle("d-none",!v);const btn=document.getElementById("googleSignInButton");btn.style.pointerEvents=v?"none":"auto";btn.style.opacity=v?"0.6":"1"}
async function waitForGoogle(maxMs=8000){const start=Date.now();while(Date.now()-start<maxMs){if(window.google?.accounts?.id)return true;await new Promise(r=>setTimeout(r,50))}return false}
function safeReturnTo(raw){const s=String(raw||"/renewals");return s.startsWith("/")&&!s.startsWith("//")?s:"/renewals"}
async function init(){msg.classList.add("d-none");let cfg;try{const r=await fetch("/public-config.json",{cache:"no-store"});cfg=await r.json()}catch{showMsg("danger","Could not load login configuration.");return}if(!cfg.googleClientId){showMsg("danger","Google Client ID is not configured.");return}if(!await waitForGoogle()){showMsg("danger","Google Sign-In failed to load. Please refresh.");return}
async function handleCredentialResponse(response){try{setBusy(true);msg.classList.add("d-none");if(!response?.credential){showMsg("danger","Google Sign-In did not return a credential.");return}const r=await fetch("/auth/login",{method:"POST",credentials:"include",headers:{"Content-Type":"application/json"},body:JSON.stringify({credential:response.credential})});const data=await r.json().catch(()=>({}));if(!r.ok||!data.ok){showMsg("danger",data?.error||`Login failed (${r.status})`);return}const params=new URLSearchParams(window.location.search);window.location.assign(safeReturnTo(params.get("returnTo")||"/renewals"))}catch(e){console.error(e);showMsg("danger","Login request failed.")}finally{setBusy(false)}}
google.accounts.id.initialize({client_id:cfg.googleClientId,callback:handleCredentialResponse});google.accounts.id.renderButton(document.getElementById("googleSignInButton"),{theme:"outline",size:"large"})}
window.addEventListener("load",init);
</script>
</body>
</html>
