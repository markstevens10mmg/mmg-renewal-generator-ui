<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MMG Renewal Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f7f8fa}.table-wrap{max-height:460px;overflow:auto}.small-table{font-size:.875rem}.card-metric{min-height:120px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}.sticky-actions{position:sticky;top:0;z-index:20;background:#f7f8fa;padding-top:1rem;padding-bottom:1rem}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand fw-semibold">MMG Renewal Generator</span>
    <div class="d-flex align-items-center gap-3">
      <span id="userLabel" class="text-muted small"></span>
      <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Logout</button>
    </div>
  </div>
</nav>

<main class="container-fluid py-3">
  <div class="sticky-actions">
    <form id="dryRunForm" class="row gy-2 gx-3 align-items-end">
      <div class="col-auto">
        <label for="invoiceDate" class="form-label mb-1">Invoice date</label>
        <input type="date" id="invoiceDate" class="form-control" required />
      </div>
      <div class="col-auto">
        <label for="renewalDays" class="form-label mb-1">Renewal window days</label>
        <input type="number" id="renewalDays" class="form-control" value="14" min="0" />
      </div>
      <div class="col-auto">
        <label for="graceDays" class="form-label mb-1">Grace days</label>
        <input type="number" id="graceDays" class="form-control" value="28" min="0" />
      </div>
      <div class="col-auto">
        <button id="dryRunBtn" type="submit" class="btn btn-primary">Run dry run</button>
      </div>
      <div class="col-auto">
        <button id="liveRunBtn" type="button" class="btn btn-danger" disabled>Generate PDFs</button>
      </div>
      <div class="col-auto">
        <span id="busy" class="text-muted d-none"><span class="spinner-border spinner-border-sm"></span> Working…</span>
      </div>
    </form>
  </div>

  <div id="alertBox"></div>
  <div id="summary" class="row g-3 mb-3 d-none"></div>
  <div id="downloads" class="mb-3 d-none"></div>

  <ul class="nav nav-tabs mb-3 d-none" id="resultTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#mailPane" type="button">Mail renewals</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#ebillPane" type="button">eBill renewals</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#bpayPane" type="button">Missing BPAY</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#suppressedPane" type="button">Suppressed preview</button></li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="mailPane"><div id="mailTable"></div></div>
    <div class="tab-pane fade" id="ebillPane"><div id="ebillTable"></div></div>
    <div class="tab-pane fade" id="bpayPane"><div id="bpayTable"></div></div>
    <div class="tab-pane fade" id="suppressedPane"><div id="suppressedTable"></div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let lastRequest=null;let lastResult=null;
const cols=["subscription_id","pub_code","publication_name","renewal_delivery_method","billing_method","subscription_status","paid_to_date","adjusted_balance_date","balance_owing","bpay_reference_number","rate_option_1_amount","rate_option_2_amount","rate_option_3_amount","suppression_reason"];
function todayPlus(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}
function setBusy(v){document.getElementById("busy").classList.toggle("d-none",!v);document.getElementById("dryRunBtn").disabled=v;document.getElementById("liveRunBtn").disabled=v||!lastResult||lastResult.response?.missing_bpay_count>0}
function alert(type,msg){document.getElementById("alertBox").innerHTML=`<div class="alert alert-${type}">${msg}</div>`}
function clearAlert(){document.getElementById("alertBox").innerHTML=""}
async function api(path,body){const r=await fetch(`/api${path}`,{method:"POST",credentials:"include",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});if(r.status===401||r.status===403){window.location.href="/login?returnTo="+encodeURIComponent(window.location.pathname+window.location.search);return null}const data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data?.detail||data?.error||`Request failed (${r.status})`);return data}
function metric(title,value,variant="primary"){return `<div class="col-sm-6 col-lg-3"><div class="card card-metric border-${variant}"><div class="card-body"><div class="text-muted">${title}</div><div class="display-6">${value}</div></div></div></div>`}
function renderSummary(result){const r=result.response;document.getElementById("summary").classList.remove("d-none");document.getElementById("summary").innerHTML=[metric("Mail",r.mail_count),metric("eBill",r.ebill_count),metric("Missing BPAY",r.missing_bpay_count,r.missing_bpay_count>0?"danger":"success"),metric("Suppressed",r.suppressed_count,"secondary")].join("");const warnings=(r.warnings||[]).map(w=>`<div class="alert alert-warning mb-2">${w}</div>`).join("");document.getElementById("alertBox").innerHTML=warnings;if(r.missing_bpay_count>0)document.getElementById("liveRunBtn").disabled=true;else document.getElementById("liveRunBtn").disabled=false}
function renderDownloads(downloads){const map={mail_csv:"Mail CSV",ebill_csv:"eBill CSV",missing_bpay_csv:"Missing BPAY CSV",suppressed_csv:"Suppressed CSV",all_candidates_csv:"All candidates CSV"};const links=Object.entries(downloads||{}).map(([k,u])=>`<a class="btn btn-outline-primary btn-sm me-2 mb-2" href="${u}" target="_blank" rel="noopener">${map[k]||k}</a>`).join("");document.getElementById("downloads").classList.remove("d-none");document.getElementById("downloads").innerHTML=`<div class="card"><div class="card-body"><h5>Downloads</h5>${links||"<span class='text-muted'>No downloads available.</span>"}</div></div>`}
function renderTable(elId,title,rows,total){const el=document.getElementById(elId);if(!rows||rows.length===0){el.innerHTML=`<div class="card"><div class="card-body"><h5>${title}</h5><p class="text-muted mb-0">No rows.</p></div></div>`;return}const headers=cols.filter(c=>rows.some(r=>r[c]!==undefined&&r[c]!==null));const body=rows.map(r=>`<tr>${headers.map(h=>`<td>${r[h]??""}</td>`).join("")}</tr>`).join("");el.innerHTML=`<div class="card"><div class="card-body"><h5>${title} <span class="text-muted fs-6">showing ${rows.length} of ${total}</span></h5><div class="table-wrap"><table class="table table-sm table-striped small-table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table></div></div></div>`}
function renderResults(result){document.getElementById("resultTabs").classList.remove("d-none");renderSummary(result);renderDownloads(result.response.downloads);renderTable("mailTable","Mail renewals",result.mail_rows,result.mail_total);renderTable("ebillTable","eBill renewals",result.ebill_rows,result.ebill_total);renderTable("bpayTable","Missing BPAY",result.missing_bpay_rows,result.missing_bpay_total);renderTable("suppressedTable","Suppressed preview",result.suppressed_rows,result.suppressed_total)}
async function loadUser(){const r=await fetch("/auth/me",{cache:"no-store",credentials:"include"});const data=await r.json();if(!data.authenticated){window.location.href="/login?returnTo="+encodeURIComponent(window.location.pathname);return}document.getElementById("userLabel").textContent=data.email}
document.getElementById("invoiceDate").value=todayPlus(1);
document.getElementById("dryRunForm").addEventListener("submit",async(e)=>{e.preventDefault();clearAlert();lastRequest={invoice_date:document.getElementById("invoiceDate").value,max_days_to_renewal_at_invoice_date:Number(document.getElementById("renewalDays").value||14),max_days_in_grace_at_invoice_date:Number(document.getElementById("graceDays").value||28)};try{setBusy(true);const result=await api("/renewals/dry-run",lastRequest);if(!result)return;lastResult=result;renderResults(result)}catch(err){alert("danger",err.message)}finally{setBusy(false)}});
document.getElementById("liveRunBtn").addEventListener("click",async()=>{if(!lastRequest)return;if(!confirm("Generate renewal PDFs for this invoice date?"))return;try{setBusy(true);const result=await api("/renewals/run",lastRequest);alert(result.status==="blocked_missing_bpay"?"danger":"success",`Live run status: <span class="mono">${result.status}</span>. Run ID: <span class="mono">${result.run_id}</span>`);renderDownloads(result.downloads)}catch(err){alert("danger",err.message)}finally{setBusy(false)}});
document.getElementById("logoutBtn").addEventListener("click",async()=>{await fetch("/auth/logout",{method:"POST",credentials:"include"});window.location.href="/login"});
loadUser();
</script>
</body>
</html>
